# Fail2ban jail configuration for Purrfect Pal Studio Nginx logs
# Scans error logs and bans IPs that trigger rate limit violations

[nginx-limit-req]
enabled  = true
port     = http,https
filter   = nginx-limit-req
logpath  = /var/log/nginx/error.log
findtime = 600
maxretry = 5
bantime  = 3600
action   = iptables-multiport[name=nginx-limit-req, port="http,https", protocol=tcp]
