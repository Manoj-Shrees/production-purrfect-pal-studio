# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect + ACME challenge for all domains
# FIX: Added www.artist.purrfectpal.studio which was missing from the original
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name
        purrfectpal.studio
        www.purrfectpal.studio
        artist.purrfectpal.studio
        www.artist.purrfectpal.studio
        admin.purrfectpal.studio
        www.admin.purrfectpal.studio;

    # Must come before the redirect so Certbot can complete ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Admin panel (admin.purrfectpal.studio)
# FIX: Cert path corrected from live/www.purrfectpal.studio → live/purrfectpal.studio
#      (Certbot names the live dir after the FIRST -d domain, which is purrfectpal.studio)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.purrfectpal.studio www.admin.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    root  /usr/share/nginx/html/admin-app;
    index index.html;

    # Static assets with caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # macOS app download
    location /macos/ {
        alias /usr/share/nginx/html/admin-app/macos/;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    # Admin is a static file app — no SPA fallback, strict 404s
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Main app (purrfectpal.studio)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name purrfectpal.studio www.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    root  /usr/share/nginx/html/main-app;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + upload + payment + socket routes
    include /etc/nginx/api_proxy.conf;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — Artist app (artist.purrfectpal.studio)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name artist.purrfectpal.studio www.artist.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    root  /usr/share/nginx/html/artist-app;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sitemap
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        try_files $uri =404;
    }

    # API + upload + payment + socket routes
    include /etc/nginx/api_proxy.conf;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}