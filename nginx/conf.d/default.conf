# ═════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect + ACME challenge
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name
        purrfectpal.studio
        www.purrfectpal.studio
        artist.purrfectpal.studio
        www.artist.purrfectpal.studio
        admin.purrfectpal.studio
        www.admin.purrfectpal.studio;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═════════════════════════════════════════════════════════════════════════════
# FIX: www → non-www canonical redirects (HTTPS)
# Splitting www into its own server block means it returns 301 immediately
# and never reaches any location block — so no CORS headers are ever set
# twice from two server blocks both matching the same included location.
# ═════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    server_name www.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://purrfectpal.studio$request_uri;
}

server {
    listen 443 ssl;
    server_name www.artist.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://artist.purrfectpal.studio$request_uri;
}

server {
    listen 443 ssl;
    server_name www.admin.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://admin.purrfectpal.studio$request_uri;
}

# ═════════════════════════════════════════════════════════════════════════════
# HTTPS — Admin panel  (canonical, no www)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name admin.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    root  /usr/share/nginx/html/admin-app;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:;" always;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control             "public, no-transform";
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ =404;
        access_log off;
    }

    location /assets/macos/ {
        alias /usr/share/nginx/html/admin-app/assets/macos/;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ═════════════════════════════════════════════════════════════════════════════
