# ═════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect + ACME challenge
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name
        purrfectpal.studio
        www.purrfectpal.studio
        artist.purrfectpal.studio
        www.artist.purrfectpal.studio
        admin.purrfectpal.studio
        www.admin.purrfectpal.studio;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═════════════════════════════════════════════════════════════════════════════
# HTTPS — Admin panel
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name admin.purrfectpal.studio www.admin.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    root  /usr/share/nginx/html/admin-app;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control             "public, no-transform";
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ =404;
        access_log off;
    }

    location /assets/macos/ {
        alias /usr/share/nginx/html/admin-app/assets/macos/;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ═════════════════════════════════════════════════════════════════════════════
# HTTPS — Main customer app  (purrfectpal.studio)
# Both this block and the artist block include api_proxy.conf, so ALL API
# routes (/api/, /socket.io/, /upload, etc.) are accessible from both origins.
# The $cors_origin map in nginx.conf whitelists both domains automatically.
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name purrfectpal.studio www.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    root  /usr/share/nginx/html/main-app;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA catch-all (must come before the include so location priority is correct)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # All API + socket + upload routes
    include /etc/nginx/api_proxy.conf;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}

# ═════════════════════════════════════════════════════════════════════════════
# HTTPS — Artist app  (artist.purrfectpal.studio)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name artist.purrfectpal.studio www.artist.purrfectpal.studio;

    ssl_certificate     /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purrfectpal.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    root  /usr/share/nginx/html/artist-app;
    index index.html;

    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        try_files $uri =404;
    }

    # All API + socket + upload routes (same file — CORS map handles both origins)
    include /etc/nginx/api_proxy.conf;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}