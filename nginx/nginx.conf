user  nginx;
worker_processes  auto;
env PPS_KEY;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/x-javascript
        image/svg+xml;

    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;

    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ── CORS origin whitelist ─────────────────────────────────────────────────
    # Returns the request's own Origin value when it is whitelisted,
    # or an empty string otherwise. The empty string means no CORS header
    # is emitted for unknown origins — safe and correct.
    map $http_origin $cors_origin {
        default "";
        "~^https://purrfectpal\.studio$"              $http_origin;
        "~^https://www\.purrfectpal\.studio$"         $http_origin;
        "~^https://artist\.purrfectpal\.studio$"      $http_origin;
        "~^https://www\.artist\.purrfectpal\.studio$" $http_origin;
        "~^https://admin\.purrfectpal\.studio$"       $http_origin;
        "~^https://www\.admin\.purrfectpal\.studio$"  $http_origin;
    }

    # ── Upstream backend ──────────────────────────────────────────────────────
    upstream backend {
        ip_hash;
        server backend-1:8080;
        server backend-2:8080;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}