user  nginx;
worker_processes  auto;
env PPS_KEY;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile       on;
    tcp_nopush     on;   # FIX: batch TCP packets → lower latency on large responses
    tcp_nodelay    on;   # FIX: disable Nagle for keep-alive connections
    keepalive_timeout 65;

    # ── Gzip compression (was missing — major cause of slow response) ─────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/x-javascript
        image/svg+xml;

    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;

    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # ── FIX: WebSocket upgrade map (was missing — critical for Socket.IO) ─────
    # Without this map, Connection is hardcoded to "upgrade" for ALL requests,
    # which disables upstream keepalive on regular HTTP and causes protocol errors.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;    # plain HTTP → close signals upstream to use keepalive
    }

    # ── CORS origin whitelist ─────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https://purrfectpal\.studio$"              $http_origin;
        "~^https://www\.purrfectpal\.studio$"         $http_origin;
        "~^https://artist\.purrfectpal\.studio$"      $http_origin;
        "~^https://www\.artist\.purrfectpal\.studio$" $http_origin;
        "~^https://admin\.purrfectpal\.studio$"       $http_origin;
        "~^https://www\.admin\.purrfectpal\.studio$"  $http_origin;
    }

    # ── FIX: ip_hash + keepalive on upstream ─────────────────────────────────
    # ip_hash   → sticky sessions required by Socket.IO; without it a reconnect
    #             can land on a different backend and the socket room/state is lost.
    # keepalive → reuse TCP connections to backend instead of opening a new one
    #             per request (was the primary cause of slow API response times).
    upstream backend {
        ip_hash;
        server backend-1:8080;
        server backend-2:8080;
        keepalive 32;   # pool of up to 32 idle keepalive connections per worker
    }

    include /etc/nginx/conf.d/*.conf;
}