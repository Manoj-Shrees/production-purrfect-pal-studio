user  nginx;
worker_processes  auto;
env PPS_KEY;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Fix: 414 Request-URI Too Large ──────────────────────────────────────
    # Angular compresses order data into URL query params. Default nginx
    # buffers (1 k) cannot hold them. Raise to 32 k per buffer so the full
    # compressed URI is accepted without HTTP 414.
    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # ── CORS origin whitelist ────────────────────────────────────────────────
   map $http_origin $cors_origin {
    default                                    $http_origin;  
    "http://localhost:4200"                    $http_origin;
    "https://purrfectpal.studio"               $http_origin;
    "https://www.purrfectpal.studio"           $http_origin;
    "https://artist.purrfectpal.studio"        $http_origin;
    "https://www.artist.purrfectpal.studio"    $http_origin;
    "https://admin.purrfectpal.studio"         $http_origin;
    "https://www.admin.purrfectpal.studio"     $http_origin;
}

    # ── Load-balanced backend upstream ──────────────────────────────────────
    upstream backend {
        server backend-1:8080;
        server backend-2:8080;
    }

    include /etc/nginx/conf.d/*.conf;
}