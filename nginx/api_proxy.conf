# ── Stripe webhook ───────────────────────────────────────────────────────────
# Intentionally no CORS headers — Stripe calls this server-to-server only.
location /payments {
    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Content-Type      $content_type;
    proxy_request_buffering off;
    client_max_body_size    2m;
}

# ── Deploy webhook (CI/CD) ───────────────────────────────────────────────────
location /deploy {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    # FIX: all CORS headers repeated inside if block — parent add_header
    # directives are dropped by nginx when an if block is active.
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    limit_req zone=one burst=5 nodelay;

    proxy_pass           http://webhook:3000/deploy;
    proxy_http_version   1.1;
    proxy_set_header     Upgrade    $http_upgrade;
    proxy_set_header     Connection 'upgrade';
    proxy_set_header     Host       $host;
    proxy_cache_bypass   $http_upgrade;
}

# ── API + Socket.IO ──────────────────────────────────────────────────────────
location ~ ^/(api|socket\.io) {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    # FIX: all CORS headers repeated inside if block.
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    limit_req zone=one burst=20 nodelay;

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
}

# ── Uploaded files (served by nginx) ─────────────────────────────────────────
location /uploadedfiles/ {
    alias   /usr/share/nginx/html/uploadedfiles/;
    expires 30d;
    add_header Cache-Control "public, no-transform";
    try_files $uri =404;
}

# ── Uploads + payment endpoints ──────────────────────────────────────────────
# FIX: removed duplicate location block (the one ending in $) — nginx matches
# the first regex and never reaches the second, making it dead config.
# Consolidated into one block with all headers and methods merged.
location ~ ^/(create-payment-intent|payment-status|upload|items/upload|profile/upload) {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    # FIX: all CORS headers repeated inside if block.
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Origin, Content-Type, Accept, Authorization, X-Requested-With, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering on;
    client_max_body_size    100M;
}