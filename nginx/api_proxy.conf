# ═════════════════════════════════════════════════════════════════════════════
# api_proxy.conf  — included by both main-app and artist-app server blocks
# All fixes annotated with # FIX:
# ═════════════════════════════════════════════════════════════════════════════

# ── Stripe webhook ────────────────────────────────────────────────────────────
# No CORS — Stripe calls this server-to-server only.
location /payments {
    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    client_max_body_size    2m;
}

# ── Deploy webhook (CI/CD) ────────────────────────────────────────────────────
location /deploy {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    limit_req zone=one burst=5 nodelay;

    proxy_pass         http://webhook:3000/deploy;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host       $host;
    proxy_cache_bypass $http_upgrade;
}

# ── Socket.IO ─────────────────────────────────────────────────────────────────
location /socket.io/ {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        $connection_upgrade;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
}

# ── REST API ──────────────────────────────────────────────────────────────────
location /api/ {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    limit_req zone=one burst=20 nodelay;

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_buffering         on;
    proxy_request_buffering on;
    proxy_read_timeout      60s;
    proxy_send_timeout      60s;
}

# ── Uploaded files ────────────────────────────────────────────────────────────
# FIX: added explicit CORS + security headers so Nginx does NOT inherit
# server-level add_header directives (which caused the duplicate
# Access-Control-Allow-Origin header when $cors_origin resolved to a value).
location /uploadedfiles/ {
    alias /usr/share/nginx/html/uploadedfiles/;
    expires 30d;

    add_header Cache-Control                    "public, no-transform"                always;
    add_header Access-Control-Allow-Origin      $cors_origin                          always;
    add_header Access-Control-Allow-Credentials "true"                                always;
    add_header X-Frame-Options                  "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options           "nosniff"                             always;
    add_header Referrer-Policy                  "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security        "max-age=31536000; includeSubDomains" always;

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  $cors_origin  always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Max-Age       86400;
        add_header Content-Length               0;
        return 204;
    }

    try_files $uri =404;
}

# ── Uploads + payment endpoints ───────────────────────────────────────────────
location ~ ^/(create-payment-intent|payment-status|upload|items/upload|profile/upload) {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Origin, Content-Type, Accept, Authorization, X-Requested-With, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering on;
    client_max_body_size    100M;
}