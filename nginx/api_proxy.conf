# ─────────────────────────────────────────────────────────────────────────────
# api_proxy.conf
# Included inside the main-app and artist-app HTTPS server blocks.
# Contains all proxy/API location blocks.
# ─────────────────────────────────────────────────────────────────────────────

# ── Stripe webhook ───────────────────────────────────────────────────────────
# proxy_request_buffering off: Stripe signature verification requires the raw
# unmodified body. Buffering re-encodes the payload and breaks constructEvent(),
# causing every webhook to return 400.
# No CORS block — Stripe calls this directly, not from a browser.
# No X-Proxy-Key header — webhook comes from Stripe, not the frontend.
# No rate-limit zone — Stripe retries on failure; blocking retries loses events.
location /payments {
    proxy_pass             http://backend;
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       Content-Type      $content_type;
    proxy_request_buffering off;
    client_max_body_size   2m;
}

# ── Deploy webhook (from CI/CD) ──────────────────────────────────────────────
location /deploy {
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    limit_req zone=one burst=5 nodelay;

    proxy_pass             http://webhook:3000/deploy;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade    $http_upgrade;
    proxy_set_header       Connection 'upgrade';
    proxy_set_header       Host       $host;
    proxy_cache_bypass     $http_upgrade;
}

# ── API + Socket.IO ──────────────────────────────────────────────────────────
location ~ ^/(api|socket\.io) {
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        return 204;
    }

    limit_req zone=one burst=20 nodelay;

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
}

# ── Uploaded files (served directly by Nginx from shared volume) ─────────────
# FIX: Replaced placeholder path with the real volume mount path from docker-compose
location /uploadedfiles/ {
    alias   /usr/share/nginx/html/uploadedfiles/;
    expires 30d;
    add_header Cache-Control "public, no-transform";
    try_files $uri =404;
}

# ── Uploads + payment intent endpoints ──────────────────────────────────────
location ~ ^/(create-payment-intent|payment-status|upload|items/upload|profile/upload) {
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_request_buffering on;
    client_max_body_size    100M;
}