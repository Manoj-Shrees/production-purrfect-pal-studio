# ═════════════════════════════════════════════════════════════════════════════
# api_proxy.conf  — included by main-app and artist-app server blocks only.
#
# FIX: www server blocks have been removed from sites.conf and replaced with
# dedicated 301-redirect blocks. This means each location in this file is
# now only ever reached by ONE server block per domain, eliminating the
# root cause of duplicate Access-Control-Allow-Origin headers.
#
# FIX: Added  Vary: Origin  to all CORS locations so CDNs and browsers
# cache per-origin and never serve a cached response for the wrong origin.
#
# FIX: Added X-Proxy-Key header forwarding to all backend proxy locations
# so that Express can validate API requests with verifyProxyKey middleware.
# ═════════════════════════════════════════════════════════════════════════════

# ── Stripe webhook ────────────────────────────────────────────────────────────
# No CORS — Stripe calls this server-to-server only.
location /payments {
    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $remote_addr;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Proxy-Key       $http_x_proxy_key;
    proxy_request_buffering off;
    client_max_body_size    2m;
}

# ── Deploy webhook (CI/CD) ────────────────────────────────────────────────────
location /deploy {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Vary'                             'Origin'     always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin                          always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS'     always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        add_header 'Vary'                             'Origin'                              always;
        return 204;
    }

    limit_req zone=one burst=5 nodelay;

    proxy_pass         http://webhook:3000/deploy;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host       $host;
    proxy_set_header   X-Proxy-Key $http_x_proxy_key;
    proxy_cache_bypass $http_upgrade;
}

location /deploy-status {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Vary'                             'Origin'     always;

    limit_req zone=one burst=5 nodelay;

    proxy_pass         http://webhook:3000/deploy-status;
    proxy_http_version 1.1;
    proxy_set_header   Host       $host;
}

# ── Socket.IO ─────────────────────────────────────────────────────────────────
location /socket.io/ {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Vary'                             'Origin'     always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin                      always;
        add_header 'Access-Control-Allow-Credentials' 'true'                            always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS'              always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        add_header 'Vary'                             'Origin'                          always;
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        $connection_upgrade;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $remote_addr;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Proxy-Key       $http_x_proxy_key;
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
}

# ── REST API ──────────────────────────────────────────────────────────────────
location /api/ {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Vary'                             'Origin'     always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin                          always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, OPTIONS'     always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        add_header 'Vary'                             'Origin'                              always;
        return 204;
    }

    limit_req zone=one burst=20 nodelay;

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $remote_addr;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Proxy-Key       $http_x_proxy_key;
    proxy_buffering         on;
    proxy_request_buffering on;
    proxy_read_timeout      60s;
    proxy_send_timeout      60s;
}

# ── Uploaded files ────────────────────────────────────────────────────────────
# Served directly by Nginx (alias, not proxied) — Express never touches this.
# FIX: Added Vary: Origin so per-origin responses are cached separately.
# FIX: $cors_origin resolves to "" for unknown origins → no header emitted,
#      which is correct (same-origin requests don't need CORS headers).
location /uploadedfiles/ {
    alias /usr/share/nginx/html/uploadedfiles/;
    expires 30d;

    add_header Cache-Control                    "public, no-transform"                always;
    add_header Access-Control-Allow-Origin      $cors_origin                          always;
    add_header Access-Control-Allow-Credentials "true"                                always;
    add_header Vary                             "Origin"                              always;
    add_header X-Frame-Options                  "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options           "nosniff"                             always;
    add_header Referrer-Policy                  "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security        "max-age=31536000; includeSubDomains" always;

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  $cors_origin  always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Max-Age       86400;
        add_header Vary                         "Origin"      always;
        add_header Content-Length               0;
        return 204;
    }
}

# ── Uploads + payment endpoints ───────────────────────────────────────────────
location ~ ^/(create-payment-intent|payment-status|upload|items/upload|profile/upload) {
    add_header 'Access-Control-Allow-Origin'      $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true'       always;
    add_header 'Vary'                             'Origin'     always;

    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'      $cors_origin                                                    always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                                          always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS'                        always;
        add_header 'Access-Control-Allow-Headers'     'Origin, Content-Type, Accept, Authorization, X-Requested-With, X-Proxy-Key' always;
        add_header 'Access-Control-Max-Age'           86400;
        add_header 'Content-Length'                   0;
        add_header 'Content-Type'                     'text/plain charset=UTF-8';
        add_header 'Vary'                             'Origin'                                                        always;
        return 204;
    }

    proxy_pass              http://backend;
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $remote_addr;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Proxy-Key       $http_x_proxy_key;
    proxy_request_buffering on;
    client_max_body_size    100M;
}