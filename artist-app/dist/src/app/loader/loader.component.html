@if (loader.loading$ | async) {
  <div id="preloader">
    <div class="preloader-wrapper">
      <div class="spinner"></div>
      <img src="/assets/images/pps-logo.png" appDisablerightclick draggable="false" oncontextmenu="return false;" alt="PurrfectPal Logo" class="logo" />
    </div>
  </div>
}
