<div class="d-flex justify-content-center align-items-center min-vh-100">
  <form class="container shadow-lg rounded p-4 mx-4" style="max-width: 768px;" #forgotpassForm="ngForm" autocomplete="on" (ngSubmit)="forgotpass($event, forgotpassForm)" autocomplete="off">
    <div class="text-center mb-4">
      <legend>Forgot Password?</legend>
      <p>Remember your password? <a routerLink="/Login">Login Here</a></p>
    </div>

    <label for="forgot-email" class="form-label">Email address</label>
    <input type="email" id="username" name="email" class="form-control" placeholder="Email" required
      autocomplete="email" [(ngModel)]="email" (ngModelChange)="validateEmail(email)" #emailField="ngModel" />

    @if (emailField.errors?.['required'] && emailField.touched) {
      <div class="text-danger mt-1">Email is
      required</div>
    }
    @if (emailInvalid) {
      <div class="text-danger mt-1">Please enter a valid email address</div>
    }

    @if (forgotpasserror) {
      <div class="text-danger mt-1">{{ forgotpasserror }}</div>
    }

    @if (isLoading) {
      <div class="d-flex justify-content-center mb-3">
        <div class="loader mt-2"></div>
      </div>
    }

    <div class="d-grid gap-2 mt-4">
      <button class="btn btn-dark" type="submit">
        Reset password
      </button>
    </div>
  </form>
</div>
