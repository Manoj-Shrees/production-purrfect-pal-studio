<div class="container py-5 d-flex justify-content-center align-items-center min-vh-100 overflow-auto">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-12 col-md-10 col-lg-10 mx-auto">
      <div class="card shadow position-relative">

        <!-- Logo -->
        <div class="logo-wrapper">
          <a routerLink="/Home" style="cursor:pointer;">
            <img src="assets/images/pps-logo.png"
                 appDisablerightclick
                 draggable="false"
                 alt="Purrfect Pal Studio Logo"
                 class="logo-badge img-fluid">
          </a>
        </div>

        <div class="card-body text-center">
          <h1 class="mt-3">Purrfect Pal Studio</h1>
          <p class="text-muted mb-4">Welcome back, Artist 🎨</p>

          <!-- Inner Glass Card -->
          <div class="inner-card p-4 mx-auto">

            <form #loginForm="ngForm" (ngSubmit)="onlogin()">

              <!-- Email -->
              <div class="mb-3 text-start">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       required
                       autocomplete="email"
                       [(ngModel)]="email"
                       #emailField="ngModel"
                       (ngModelChange)="validateEmail(email)">
                <div class="text-danger mt-1" *ngIf="emailField.invalid && emailField.touched">
                  Please enter a valid email
                </div>
              </div>

          
              <!-- Password -->
              <div class="mb-3 text-start position-relative">
                <label for="password">Password</label>

                <!-- Input wrapper for better positioning -->
                <div class="password-wrapper position-relative">
                  <input type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        [(ngModel)]="password"
                        #passwordField="ngModel"
                        #passwordInput
                        class="form-control pe-5"> <!-- padding-end for eye icon -->

                  <!-- Eye Icon -->
                  <i class="fa-solid password-toggle position-absolute top-50 end-2 translate-middle-y"
                    [class.fa-eye]="!isPasswordVisible"
                    [class.fa-eye-slash]="isPasswordVisible"
                    (click)="togglePassword(passwordInput)"></i>
                </div>

                <!-- Validation Message -->
                <div class="text-danger mt-1" *ngIf="passwordField.invalid && passwordField.touched">
                  Password is required
                </div>
              </div>


              <!-- Forgot Password -->
              <div class="d-flex justify-content-end mb-3">
                <a (click)="openforgotpassroute()" style="cursor: pointer; color: blue;">Forgot Password?</a>
              </div>

              <!-- Error Message -->
              <div class="text-danger mb-3" *ngIf="loginError">
                {{ loginError }}
              </div>

              <!-- Loader -->
              <div class="d-flex justify-content-center mb-3" *ngIf="isLoading">
                <div class="loader"></div>
              </div>

              <button class="btn-login" type="submit" [disabled]="isLoading">
                Login
              </button>

              <p class="mt-4">
                Don’t have an account?
                <a routerLink="/signup">Sign Up</a>
              </p>

            </form>
          </div> <!-- /inner-card -->

        </div>
      </div>
    </div>
  </div>
</div>
