<section>

  <div class="conatiner d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="" style="max-width: 700px; width: 80%">
      <div class="text-center ">
        <h2><i class="fa fa-key me-2"></i>Change Your Password</h2>
        <p>Identity verified account. Set your new password.</p>
      </div>


      <form (ngSubmit)="onSubmit()" #form="ngForm"
        class="needs-validation container p-3 rounded bg-body-secondary shadow-sm border" novalidate>

        <!-- Password Field -->
        <div class="mb-3 position-relative">
          <label class="form-label">Password</label>
          <input #passwordInput [(ngModel)]="password" name="password" required type="password"
            class="form-control" />
          <i class="fa" [class.fa-eye]="!isPasswordVisible" [class.fa-eye-slash]="isPasswordVisible"
            (click)="togglePassword(passwordInput)"
          style="position: absolute; top: 60%; right: 2%; cursor: pointer;"></i>
        </div>

        <!-- Confirm Password Field -->
        <div class=" mb-3 position-relative">
          <label class="form-label">Confirm Password</label>
          <input #confirmInput [(ngModel)]="confirmPassword" name="confirmPassword" required type="password"
            class="form-control" />
          <i class="fa" [class.fa-eye]="!isConfirmVisible" [class.fa-eye-slash]="isConfirmVisible"
            (click)="toggleConfirm(confirmInput)"
          style="position: absolute; ; top: 60%; right: 2%; cursor: pointer;"></i>
        </div>
        <!-- Optional message only -->
        @if (confirmPassword && !passwordsMatch()) {
          <div class="text-danger small mt-1 mb-3">
            Passwords do not match.
          </div>
        }

        <!-- Submit -->
        <div class="text-center">
          <button class="btn btn-dark w-50" type="submit" [disabled]="!form.valid || !passwordsMatch()">
            Reset Password
          </button>
        </div>

      </form>

      <div class="text-center text-success rounded p-2 mt-3">
        <p>Paswword Has been Reset. You can Login Now </p>

        <button class="btn btn-dark text-center">Login Here</button>
      </div>

    </div>
  </div>
</section>
