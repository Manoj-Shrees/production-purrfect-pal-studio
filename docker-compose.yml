version: '3.8'
# Trigger redeployment for contract table initialization

services:

  # ── MySQL Database ───────────────────────────

  db:
    image: manojshrees/purrfectpalstudio-db:latest
    container_name: db-c
    expose:
      - "3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    networks:
      - pps-network

  # ── Backend – Two instances for redundancy ───

  backend-1:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-1
    privileged: true
    security_opt:
      - label:disable
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      # ── Instance ──────────────────────────────
      - INSTANCE_ID=1
      # ── Database ──────────────────────────────
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # ── Auth / Encryption ─────────────────────
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - COOKIE_NAME=${COOKIE_NAME}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - BYCRPT_SALT=${BYCRPT_SALT}
      # ── API Keys ──────────────────────────────
      - PPS_KEY=${PPS_KEY}
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - ARTIST_KEY=${ARTIST_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      # ── Email / SMTP ──────────────────────────
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      # ── Stripe ────────────────────────────────
      - STRIPE_KEY=${STRIPE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # ── APNs ──────────────────────────────────
      - APNS_KEY_PATH=${APNS_KEY_PATH}
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
      - APNS_IOS_BUNDLE_ID=${APNS_IOS_BUNDLE_ID}
      - APNS_MACOS_BUNDLE_ID=${APNS_MACOS_BUNDLE_ID}
      - APNS_PRODUCTION=${APNS_PRODUCTION}
      # ── Web Push / VAPID ──────────────────────
      - VAPID_EMAIL=${VAPID_EMAIL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      # ── Runtime ───────────────────────────────
      - NODE_ENV=${NODE_ENV}
      - NODE_PORT=${NODE_PORT}
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
      - private_contracts_data:/app/private_contracts
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  backend-2:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-2
    privileged: true
    security_opt:
      - label:disable
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      # ── Instance ──────────────────────────────
      - INSTANCE_ID=2
      # ── Database ──────────────────────────────
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      # ── Auth / Encryption ─────────────────────
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      - COOKIE_NAME=${COOKIE_NAME}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - BYCRPT_SALT=${BYCRPT_SALT}
      # ── API Keys ──────────────────────────────
      - PPS_KEY=${PPS_KEY}
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - ARTIST_KEY=${ARTIST_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ALLOWED_IPS=${ALLOWED_IPS}
      # ── Email / SMTP ──────────────────────────
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      # ── Stripe ────────────────────────────────
      - STRIPE_KEY=${STRIPE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # ── APNs ──────────────────────────────────
      - APNS_KEY_PATH=${APNS_KEY_PATH}
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
      - APNS_IOS_BUNDLE_ID=${APNS_IOS_BUNDLE_ID}
      - APNS_MACOS_BUNDLE_ID=${APNS_MACOS_BUNDLE_ID}
      - APNS_PRODUCTION=${APNS_PRODUCTION}
      # ── Web Push / VAPID ──────────────────────
      - VAPID_EMAIL=${VAPID_EMAIL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      # ── Runtime ───────────────────────────────
      - NODE_ENV=${NODE_ENV}
      - NODE_PORT=${NODE_PORT}
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
      - private_contracts_data:/app/private_contracts
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Nginx ────────────────────────────────────

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      PPS_KEY: "${PPS_KEY}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/api_proxy.conf:/etc/nginx/api_proxy.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot_www:/var/www/certbot:ro
      - ./certs:/etc/ssl/certs:ro
      - ./main-app/dist:/usr/share/nginx/html/main-app:ro
      - ./artist-app/dist:/usr/share/nginx/html/artist-app:ro
      - ./admin-app:/usr/share/nginx/html/admin-app:ro
      - ./promotions/dist:/usr/share/nginx/html/promotions-app:ro
      - uploads_data:/usr/share/nginx/html/uploadedfiles:ro
    depends_on:
      - backend-1
      - backend-2
      - db
    networks:
      - pps-network

  # ── Certbot / Let's Encrypt ──────────────────

  certbot:
    build: ./certbot
    container_name: certbot
    privileged: true
    security_opt:
      - label:disable
    restart: unless-stopped
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot_www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    networks:
      - pps-network

  # ── DB Backup ────────────────────────────────

  db-backup:
    container_name: db-backup-c
    restart: always
    build: ./db-backup
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - BACKUP_CRON=${BACKUP_CRON}
      - RETENTION_DAYS=${RETENTION_DAYS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH}
    volumes:
      - ./backups:/backups
      - uploads_data:/app/uploadedfiles:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Webhook Listener ─────────────────────────

  webhook:
    build: ./webhook
    container_name: webhook-listener
    privileged: true
    security_opt:
      - label:disable
    restart: always
    expose:
      - "3000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - DOCKER_USER=${DOCKER_USER}
      - DOCKER_PASS=${DOCKER_PASS}
    volumes:
      - .:/app/production-purrfect-pal-studio
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backups
    networks:
      - pps-network

volumes:
  mysql_data:
  uploads_data:
  private_contracts_data:

networks:
  pps-network:
    driver: bridge