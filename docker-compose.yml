version: '3.8'

services:

  # ── MySQL Database ───────────────────────────

  db:
    image: manojshrees/purrfectpalstudio-db:latest
    container_name: db-c
    expose:
      - "3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=Toor@77@MTS@77*"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Toor@77@MTS@77*
    networks:
      - pps-network

  # ── Backend – Two instances for redundancy ───

  backend-1:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-1
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PPS_KEY=PurrfectPalStudio2024$%^
      - INSTANCE_ID=1
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  backend-2:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-2
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PPS_KEY=PurrfectPalStudio2024$%^
      - INSTANCE_ID=2
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Nginx ────────────────────────────────────

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      PPS_KEY: "PurrfectPalStudio2024$%^"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/api_proxy.conf:/etc/nginx/api_proxy.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./certs:/etc/ssl/certs:ro
      - ./main-app/dist:/usr/share/nginx/html/main-app:ro
      - ./artist-app/dist:/usr/share/nginx/html/artist-app:ro
      - ./admin-app:/usr/share/nginx/html/admin-app:ro
      - uploads_data:/usr/share/nginx/html/uploadedfiles:ro
    depends_on:
      - backend-1
      - backend-2
      - db
    networks:
      - pps-network

  # ── Certbot / Let's Encrypt ──────────────────
  # FIX 1: build: ./certbot instead of image — custom image includes docker-cli
  #         so the deploy hook can run 'docker exec nginx-proxy nginx -s reload'
  # FIX 2: /var/run/docker.sock mounted so deploy hook can reach the Docker daemon
  # FIX 3: restart: unless-stopped — avoids rapid-retry loops hitting LE rate limits
  # FIX 4: cert check path corrected to live/purrfectpal.studio (first -d domain)
  # FIX 5: deploy hook installed into /etc/letsencrypt/renewal-hooks/deploy/
  #         so it fires automatically on every successful renewal
  # FIX 6: renew command no longer re-specifies --webroot flags (saved in renewal config)

  certbot:
    build: ./certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CERTBOT_EMAIL=suwasmgr77@gmail.com
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;

        mkdir -p /etc/letsencrypt/renewal-hooks/deploy;
        cp /deploy-hook.sh /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh;
        chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh;

        if [ ! -f /etc/letsencrypt/live/purrfectpal.studio/fullchain.pem ]; then
          echo '[Certbot] No cert found — obtaining for all domains...';
          certbot certonly
            --webroot
            --webroot-path=/var/www/certbot
            --email suwasmgr77@gmail.com
            --agree-tos
            --no-eff-email
            --non-interactive
            -d purrfectpal.studio
            -d www.purrfectpal.studio
            -d admin.purrfectpal.studio
            -d www.admin.purrfectpal.studio
            -d artist.purrfectpal.studio
            -d www.artist.purrfectpal.studio
            && /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
            || echo '[Certbot] Initial cert fetch failed — check nginx is serving /.well-known/acme-challenge/';
        else
          echo '[Certbot] Cert already exists — skipping initial obtain';
        fi;

        while :; do
          certbot renew --quiet || true;
          sleep 12h & wait $${!};
        done"
    depends_on:
      - nginx
    networks:
      - pps-network

  # ── DB Backup ────────────────────────────────

  db-backup:
    container_name: db-backup-c
    restart: always
    build: ./db-backup
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=adminPPS
      - MYSQL_PASSWORD=Toor@PPS@77admin*
      - MYSQL_DATABASE=purrfectpalstudiodb
      - BACKUP_CRON=0 */6 * * *
      - RETENTION_DAYS=14
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=manoj-shrees/purrfect-pal-studio-db-backups
      - GITHUB_BRANCH=main
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Webhook Listener ─────────────────────────

  webhook:
    build: ./webhook
    container_name: webhook-listener
    restart: always
    expose:
      - "3000"
    volumes:
      - /root/production-purrfect-pal-studio:/app/production-purrfect-pal-studio
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pps-network

volumes:
  mysql_data:
  uploads_data:

networks:
  pps-network:
    driver: bridge