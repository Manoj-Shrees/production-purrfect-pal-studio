version: '3.8'
# Trigger redeployment for admin status overrides

services:

  # ── MySQL Database ───────────────────────────

  db:
    image: manojshrees/purrfectpalstudio-db:latest
    container_name: db-c
    expose:
      - "3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    networks:
      - pps-network

  # ── Backend – Two instances for redundancy ───

  backend-1:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-1
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PPS_KEY=${PPS_KEY}
      - INSTANCE_ID=1
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  backend-2:
    image: manojshrees/purrfectpalstudio-backend:latest
    container_name: backend-c-2
    restart: always
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - PPS_KEY=${PPS_KEY}
      - INSTANCE_ID=2
    volumes:
      - ./certs:/app/certs:ro
      - uploads_data:/app/uploadedfiles
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Nginx ────────────────────────────────────

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      PPS_KEY: "${PPS_KEY}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/api_proxy.conf:/etc/nginx/api_proxy.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - ./certs:/etc/ssl/certs:ro
      - ./main-app/dist:/usr/share/nginx/html/main-app:ro
      - ./artist-app/dist:/usr/share/nginx/html/artist-app:ro
      - ./admin-app:/usr/share/nginx/html/admin-app:ro
      - uploads_data:/usr/share/nginx/html/uploadedfiles:ro
    depends_on:
      - backend-1
      - backend-2
      - db
    networks:
      - pps-network

  # ── Certbot / Let's Encrypt ──────────────────

  certbot:
    build: ./certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    depends_on:
      - nginx
    networks:
      - pps-network

  # ── DB Backup ────────────────────────────────

  db-backup:
    container_name: db-backup-c
    restart: always
    build: ./db-backup
    environment:
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - BACKUP_CRON=${BACKUP_CRON}
      - RETENTION_DAYS=${RETENTION_DAYS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH}
    volumes:
      - ./backups:/backups
      - uploads_data:/app/uploadedfiles:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pps-network

  # ── Webhook Listener ─────────────────────────

  webhook:
    build: ./webhook
    container_name: webhook-listener
    restart: always
    expose:
      - "3000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - DOCKER_USER=${DOCKER_USER}
      - DOCKER_PASS=${DOCKER_PASS}
    volumes:
      - /root/production-purrfect-pal-studio:/app/production-purrfect-pal-studio
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/backups
    networks:
      - pps-network

volumes:
  mysql_data:
  uploads_data:

networks:
  pps-network:
    driver: bridge